<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="tie.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TIE — The Interconnected Emulator</title>
    <meta name="description" content="TIE is a professional-grade, browser-based emulation frontend supporting 20+ retro gaming systems with Netplay P2P, Library Scanner, CRT filters, and more." />
    <meta name="theme-color" content="#0f111a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <style>
      /* Inline critical styles to prevent flash of black screen while external CSS loads */
      html, body { margin: 0; padding: 0; background: #070913; }
      #root { display: flex; min-height: 100vh; width: 100vw; }
      #tie-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 100vh;
        color: #f0f0f0;
        font-family: sans-serif;
        gap: 1rem;
        background: #070913;
      }
      #tie-loading .tie-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255,46,147,0.2);
        border-top-color: #ff2e93;
        border-radius: 50%;
        animation: tie-spin 0.8s linear infinite;
      }
      @keyframes tie-spin { to { transform: rotate(360deg); } }
      #tie-loading p { font-size: 1rem; color: #8892b0; margin: 0; }
    </style>
    <script type="module" crossorigin src="/TIE/assets/index-DdHOiFie.js"></script>
    <link rel="stylesheet" crossorigin href="/TIE/assets/index-CbI_meok.css">
  </head>
  <body>
    <div id="root">
      <div id="tie-loading">
        <div class="tie-spinner"></div>
        <p>Loading TIE Emulator…</p>
      </div>
    </div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#f0f0f0;font-family:sans-serif;background:#070913;text-align:center;padding:2rem;">
        <p>TIE requires JavaScript to run. Please enable JavaScript in your browser.</p>
      </div>
    </noscript>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Use relative path for sw.js to ensure compatibility with Vite's base path
          navigator.serviceWorker.register('sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
